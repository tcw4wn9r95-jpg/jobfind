name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Write version info
        run: |
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BUILD_SHA: ${{ env.SHA }}
          NEXT_PUBLIC_BUILD_TIME: ${{ env.BUILT_AT }}
      - name: Publish version.json (always fetched fresh, never bundled/cached with the app shell)
        run: |
          echo "{\"sha\":\"${SHA}\",\"built_at\":\"${BUILT_AT}\"}" > out/version.json
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # keep_files so the daily scanner's leads/ directory survives app deploys
          keep_files: true
